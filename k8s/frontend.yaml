apiVersion: apps/v1
kind: Deployment
metadata:
  name: kyc-frontend
  labels:
    app: kyc-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kyc-frontend
  template:
    metadata:
      labels:
        app: kyc-frontend
    spec:
      containers:
      - name: frontend
        image: tinyfish-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: kyc-frontend
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30000
  selector:
    app: kyc-frontend
